<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷电战机 - Thunder Warrior</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: flex-start; padding-top: 100px; min-height: 100vh; font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; }
        #gameContainer { position: relative; }
        #gameCanvas { 
            border: 2px solid #0ff; 
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            max-width: 100vw;
            max-height: 100vh;
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; color: #fff; font-size: 14px; pointer-events: none; }
        #healthBar { width: 200px; height: 20px; background: #333; border: 2px solid #0ff; border-radius: 3px; overflow: hidden; }
        #healthFill { height: 100%; background: linear-gradient(90deg, #f00, #ff0); transition: width 0.2s; }
        #statsLeft { margin-top: 5px; text-align: left; }
        #statsRight { position: absolute; top: 10px; right: 10px; text-align: right; }
        #bestPlayerName { color: #ff0; font-size: 14px; }
        #bestScoreVal { color: #ff0; font-size: 18px; font-weight: bold; }
        #nextUpgrade { color: #ff0; font-size: 12px; margin-top: 3px; }
        #missileIndicator { position: absolute; bottom: 10px; left: 10px; color: #FF4500; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px #FF4500; pointer-events: none; }
        #leechIndicator { position: absolute; bottom: 35px; left: 10px; color: #0f0; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px #0f0; pointer-events: none; }
        #bulletIndicator { position: absolute; bottom: 60px; left: 10px; color: #0ff; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px #0ff; pointer-events: none; }
        #skillPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #0f0; border-radius: 15px; padding: 25px; color: #fff; display: none; z-index: 100; text-align: center; min-width: 300px; }
        #skillPanel h2 { color: #0f0; margin-bottom: 20px; font-size: 22px; }
        .skill-option { background: linear-gradient(180deg, #1a1a1a, #333); border: 2px solid #0f0; color: #fff; padding: 15px 20px; margin: 10px 0; cursor: pointer; border-radius: 8px; font-size: 16px; transition: all 0.2s; width: 100%; }
        .skill-option:hover { background: linear-gradient(180deg, #2a2a2a, #444); box-shadow: 0 0 15px #0f0; transform: scale(1.02); }
        .skill-option .skill-name { color: #0f0; font-size: 18px; font-weight: bold; }
        .skill-option .skill-desc { color: #aaa; font-size: 12px; margin-top: 5px; }
        #selectPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #f00; border-radius: 10px; padding: 30px; color: #fff; z-index: 100; }
        #selectPanel h2 { color: #f00; text-align: center; margin-bottom: 20px; }
        .plane-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .plane-btn { background: linear-gradient(180deg, #1a1a1a, #333); border: 2px solid #f00; color: #fff; padding: 15px; cursor: pointer; border-radius: 8px; text-align: center; transition: all 0.2s; }
        .plane-btn:hover { border-color: #ff0; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .plane-btn canvas { display: block; margin: 0 auto 10px; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); border: 2px solid #f00; border-radius: 10px; padding: 30px; color: #fff; text-align: center; display: none; z-index: 100; }
        #gameOver h2 { color: #f00; font-size: 28px; margin-bottom: 15px; }
        #restartBtn { background: linear-gradient(180deg, #600, #900); border: 2px solid #f00; color: #fff; padding: 10px 30px; cursor: pointer; border-radius: 5px; font-size: 16px; margin-top: 15px; }
        #restartBtn:hover { box-shadow: 0 0 15px #f00; }
        #loginPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #0ff; border-radius: 15px; padding: 30px; color: #fff; z-index: 100; text-align: center; min-width: 300px; }
        #loginPanel h2 { color: #0ff; margin-bottom: 20px; }
        #playerName { background: #222; border: 2px solid #0ff; color: #fff; padding: 10px; font-size: 16px; border-radius: 5px; width: 80%; text-align: center; margin-bottom: 15px; }
        #loginBtn { background: linear-gradient(180deg, #006, #009); border: 2px solid #0ff; color: #fff; padding: 10px 30px; cursor: pointer; border-radius: 5px; font-size: 16px; }
        #loginBtn:hover { box-shadow: 0 0 15px #0ff; }
        #bestScoreDisplay { color: #ff0; font-size: 14px; margin-top: 10px; }
        #playerList { margin-top: 15px; text-align: left; max-height: 160px; overflow-y: auto; border-top: 1px solid #0ff3; padding-top: 10px; }
        #playerList h3 { color: #0ff; font-size: 13px; margin-bottom: 6px; text-align: center; }
        .player-record { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; border-radius: 4px; font-size: 12px; margin-bottom: 3px; background: rgba(255,255,255,0.05); }
        .player-record .pr-rank { color: #ff0; width: 20px; }
        .player-record .pr-name { color: #fff; flex: 1; margin-left: 4px; }
        .player-record .pr-score { color: #0f0; font-weight: bold; }
        .player-record .pr-count { color: #888; font-size: 11px; margin-left: 6px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="1000"></canvas>
        <div id="ui">
            <div id="healthBar"><div id="healthFill"></div></div>
            <div id="statsLeft">
                <span id="healthText">HP: 10000 / 10000</span><br>
                <span id="score">积分: 0</span><br>
                <span id="level">等级: 1</span>
            </div>
            <div id="statsRight">
                <div id="bestPlayerName">🏆 最高: -</div>
                <div id="bestScoreVal">0</div>
            </div>
            <div id="nextUpgrade">升级还需: 1000分</div>
        </div>
        <div id="bulletIndicator">🔫<span id="bulletLevel">1</span></div>
        <div id="missileIndicator">🎯<span id="missileLevel">0</span></div>
        <div id="leechIndicator">🩸<span id="leechLevel">0</span></div>
        <div id="loginPanel">
            <h2>🎮 雷电战机</h2>
            <input type="text" id="playerName" placeholder="输入你的名字" maxlength="10">
            <br>
            <button id="loginBtn">开始游戏</button>
            <div id="bestScoreDisplay"></div>
            <div id="playerList"></div>
        </div>
        <div id="selectPanel">
            <h2>选择你的战机</h2>
            <div class="plane-select">
                <div class="plane-btn" data-plane="0"><canvas id="preview0" width="64" height="80"></canvas><div>歼-10 猛龙</div></div>
                <div class="plane-btn" data-plane="1"><canvas id="preview1" width="64" height="80"></canvas><div>歼-16 潜龙</div></div>
                <div class="plane-btn" data-plane="2"><canvas id="preview2" width="64" height="80"></canvas><div>歼-20 威龙</div></div>
                <div class="plane-btn" data-plane="3"><canvas id="preview3" width="64" height="80"></canvas><div>歼-35 鹘鹰</div></div>
            </div>
        </div>
        <div id="skillPanel">
            <h2>🎉 升级成功！选择技能</h2>
            <div class="skill-option" onclick="selectSkill('multishot')" id="multishotOption">
                <div class="skill-name">🔫 多重子弹</div>
                <div class="skill-desc">子弹数 +1 (当前: <span id="bulletCountVal">1</span>/5)</div>
            </div>
            <div class="skill-option" onclick="selectSkill('ricochet')" id="ricochetOption">
                <div class="skill-name">↩️ 弹射导弹</div>
                <div class="skill-desc">子弹弹射 +1 (当前: <span id="ricochetVal">0</span>/3)</div>
            </div>
            <div class="skill-option" onclick="selectSkill('heal')">
                <div class="skill-name">❤️ 修复机体</div>
                <div class="skill-desc">恢复 3000 生命值</div>
            </div>
            <div class="skill-option" onclick="selectSkill('leech')" id="leechOption">
                <div class="skill-name">🩸 吸血</div>
                <div class="skill-desc">击敌回血 +<span id="leechVal">1</span> (当前: Lv<span id="leechVal2">0</span>/20)</div>
            </div>
            <div class="skill-option" onclick="selectSkill('missile')" id="missileOption">
                <div class="skill-name">🎯 跟踪弹</div>
                <div class="skill-desc">跟踪弹 +1 (当前: <span id="missileVal">0</span>/3)</div>
            </div>
        </div>
        <div id="gameOver">
            <h2>游戏结束</h2>
            <p>最终积分: <span id="finalScore">0</span></p>
            <p>最高等级: <span id="finalLevel">1</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 自适应屏幕尺寸
        let WIDTH, HEIGHT;
        function resizeCanvas() {
            const maxWidth = window.innerWidth - 20;
            const maxHeight = window.innerHeight - 20;
            const aspect = 600 / 1000;
            
            if (maxWidth / maxHeight > aspect) {
                canvas.height = Math.min(maxHeight, 1000);
                canvas.width = canvas.height * aspect;
            } else {
                canvas.width = Math.min(maxWidth, 600);
                canvas.height = canvas.width / aspect;
            }
            WIDTH = canvas.width;
            HEIGHT = canvas.height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let gameState = 'select';
        let score = 0, level = 1, maxHp = 10000, currentHp = 10000, selectedPlane = 0;
        let bulletCount = 1, ricochetCount = 0, missileCount = 0, leechLevel = 0;
        // 总积分（累计所有游戏的积分）
        let playerName = localStorage.getItem('thunderWarriorPlayerName') || '';
        let bestScore = parseInt(localStorage.getItem('thunderWarriorBestScore') || '0');
        let lastScore = parseInt(localStorage.getItem('thunderWarriorLastScore') || '0');

        const player = { x: WIDTH/2, y: HEIGHT - 100, width: 32, height: 40, bullets: [] };
        let enemies = [], particles = [];
        let mouseX = WIDTH/2, mouseY = HEIGHT - 100;
        // 100级升级表（累计总分）：1000→2200→3700→5500...
        // 每次升级需要的增量：1000, 1200, 1500, 1800...
        const UPGRADE_THRESHOLDS = (() => {
            const arr = [];
            let total = 0;
            let increment = 1000;
            for (let i = 0; i < 100; i++) {
                total += increment;
                arr.push(total);
                increment += 200;
            }
            return arr;
        })();
        
        function getUpgradeThreshold() {
            return UPGRADE_THRESHOLDS[Math.min(level - 1, UPGRADE_THRESHOLDS.length - 1)];
        }

        // 绘制中国战机
        function drawPlane(ctx, x, y, w, h, type) {
            ctx.save(); ctx.translate(x, y);
            const scale = w / 32; ctx.scale(scale, scale);
            const bw = 32, bh = 40;
            ctx.fillStyle = type === 0 ? '#8B0000' : type === 1 ? '#800000' : type === 2 ? '#2F0000' : '#1A0000';
            ctx.beginPath(); ctx.moveTo(bw/2, 0); ctx.lineTo(bw/2 + 5, bh - 5); ctx.lineTo(bw/2 - 5, bh - 5); ctx.fill();
            ctx.fillStyle = type === 0 ? '#B22222' : type === 1 ? '#A52A2A' : type === 2 ? '#4A0000' : '#330000';
            ctx.beginPath(); ctx.moveTo(bw/2 - 3, bh * 0.4); ctx.lineTo(0, bh * 0.7); ctx.lineTo(bw/2 - 3, bh * 0.6); ctx.fill();
            ctx.beginPath(); ctx.moveTo(bw/2 + 3, bh * 0.4); ctx.lineTo(bw, bh * 0.7); ctx.lineTo(bw/2 + 3, bh * 0.6); ctx.fill();
            ctx.fillStyle = type === 0 ? '#00CED1' : type === 1 ? '#20B2AA' : type === 2 ? '#FFD700' : '#4169E1';
            ctx.beginPath(); ctx.ellipse(bw/2, bh * 0.3, 3, 5, 0, 0, 6.28); ctx.fill();
            ctx.restore();
        }

        // 绘制敌机 - 美国战斗机（炫酷版）
        function drawEnemy(ctx, x, y, w, h, t) {
            ctx.save(); ctx.translate(x, y); ctx.scale(w/40, h/40);

            const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 200);

            function poly(pts, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(pts[0][0], pts[0][1]);
                for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
                ctx.closePath(); ctx.fill();
            }
            function gradBody(pts, x1, y1, x2, y2, c1, c2) {
                const g = ctx.createLinearGradient(x1, y1, x2, y2);
                g.addColorStop(0, c1); g.addColorStop(1, c2);
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.moveTo(pts[0][0], pts[0][1]);
                for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
                ctx.closePath(); ctx.fill();
            }
            function exhaust(ex, ey, r, c1, c2) {
                c1 = c1 || 'rgba(255,220,100,';
                c2 = c2 || 'rgba(255,80,0,';
                const g = ctx.createRadialGradient(ex, ey, 0, ex, ey, r);
                g.addColorStop(0, c1 + pulse + ')');
                g.addColorStop(0.5, c2 + (pulse*0.7) + ')');
                g.addColorStop(1, 'rgba(255,0,0,0)');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(ex, ey, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = `rgba(255,255,220,${pulse})`;
                ctx.beginPath(); ctx.arc(ex, ey, r*0.3, 0, Math.PI*2); ctx.fill();
            }
            function cockpitGlow(cx, cy, rx, ry, c, gc) {
                ctx.shadowBlur = 10; ctx.shadowColor = gc;
                ctx.fillStyle = c;
                ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
            function wingTipLight(lx, ly, rx, ry) {
                ctx.fillStyle = `rgba(255,60,60,${pulse})`;
                ctx.beginPath(); ctx.arc(lx, ly, 1.2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = `rgba(60,255,60,${pulse})`;
                ctx.beginPath(); ctx.arc(rx, ry, 1.2, 0, Math.PI*2); ctx.fill();
            }
            
            if (t === 0) { // F-16 战隼 - 轻型，青色高亮
                gradBody([[20,1],[24,8],[25,36],[20,40],[15,36],[16,8]], 0,20,40,20, '#B0BEC5','#546E7A');
                poly([[20,16],[1,32],[15,27]], '#607D8B');
                poly([[20,16],[39,32],[25,27]], '#607D8B');
                poly([[20,16],[1,32],[3,29]], '#90A4AE'); // 前缘高光
                poly([[20,16],[39,32],[37,29]], '#90A4AE');
                poly([[18,32],[10,39],[16,37]], '#37474F');
                poly([[22,32],[30,39],[24,37]], '#37474F');
                poly([[20,27],[17,36],[23,36]], '#263238'); // 腹鳍
                ctx.fillStyle = '#1A237E'; ctx.fillRect(16,19,3,5); ctx.fillRect(21,19,3,5); // 进气口
                cockpitGlow(20, 11, 2.8, 5.5, '#80DEEA', '#00BCD4');
                exhaust(20, 41, 6);
                wingTipLight(1.5, 32, 38.5, 32);
            }
            else if (t === 1) { // F-15 鹰 - 中型，双发橙焰
                gradBody([[20,1],[26,10],[28,36],[24,40],[20,38],[16,40],[12,36],[14,10]], 0,20,40,20, '#CFD8DC','#607D8B');
                poly([[18,12],[-2,30],[12,27]], '#546E7A');
                poly([[22,12],[42,30],[28,27]], '#546E7A');
                poly([[18,12],[-2,30],[-1,26]], '#90A4AE');
                poly([[22,12],[42,30],[41,26]], '#90A4AE');
                poly([[14,20],[8,38],[14,34]], '#37474F'); // 双垂尾
                poly([[26,20],[32,38],[26,34]], '#37474F');
                poly([[17,30],[10,38],[15,36]], '#263238');
                poly([[23,30],[30,38],[25,36]], '#263238');
                cockpitGlow(20, 9, 3.2, 5, '#90CAF9', '#1565C0');
                exhaust(15, 41, 5); exhaust(25, 41, 5);
                wingTipLight(-1, 30, 41, 30);
            }
            else if (t === 2) { // F/A-18 大黄蜂 - 中型，绿色翼尖
                gradBody([[20,1],[25,9],[27,36],[20,40],[13,36],[15,9]], 0,20,40,20, '#B0BEC5','#4A5568');
                poly([[20,6],[7,20],[14,18]], '#78909C'); // LEX边条翼
                poly([[20,6],[33,20],[26,18]], '#78909C');
                poly([[15,18],[1,32],[13,28]], '#546E7A');
                poly([[25,18],[39,32],[27,28]], '#546E7A');
                poly([[4,29],[1,32],[5,31]], '#37474F'); // 翼尖折叠
                poly([[36,29],[39,32],[35,31]], '#37474F');
                poly([[14,22],[8,39],[14,34]], '#37474F'); // 外倾双垂尾
                poly([[26,22],[32,39],[26,34]], '#37474F');
                poly([[17,32],[11,38],[16,36]], '#263238');
                poly([[23,32],[29,38],[24,36]], '#263238');
                cockpitGlow(20, 7, 2.5, 4.5, '#A5F3FC', '#06B6D4');
                exhaust(15, 40, 4); exhaust(25, 40, 4);
                wingTipLight(1, 32, 39, 32);
            }
            else if (t === 3) { // F-22 猛禽 - 重型隐身，蓝焰
                gradBody([[20,1],[23,7],[26,20],[25,36],[20,40],[15,36],[14,20],[17,7]], 0,0,40,40, '#374151','#111827');
                poly([[20,12],[4,24],[12,28]], '#1F2937');
                poly([[20,12],[36,24],[28,28]], '#1F2937');
                poly([[12,28],[4,24],[7,30]], '#111827');
                poly([[28,28],[36,24],[33,30]], '#111827');
                poly([[14,20],[6,36],[13,32]], '#0F172A'); // 倾斜双垂尾
                poly([[26,20],[34,36],[27,32]], '#0F172A');
                cockpitGlow(20, 6, 2.5, 4.5, '#FDE68A', '#D97706'); // 镀金座舱
                ctx.strokeStyle = '#374151'; ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(17,8); ctx.lineTo(15,22); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(23,8); ctx.lineTo(25,22); ctx.stroke();
                exhaust(15, 40, 5, 'rgba(150,200,255,', 'rgba(80,130,255,');
                exhaust(25, 40, 5, 'rgba(150,200,255,', 'rgba(80,130,255,');
                ctx.fillStyle = '#374151'; ctx.fillRect(4,23,3,2); ctx.fillRect(33,23,3,2); // ECM吊舱
                wingTipLight(5, 24, 35, 24);
            }
            else if (t === 4) { // F-35 闪电II - 重型单发，金座舱
                gradBody([[20,1],[23,11],[24,20],[23,34],[20,40],[17,34],[16,20],[17,11]], 0,0,40,40, '#94A3B8','#334155');
                poly([[20,15],[2,30],[15,27]], '#475569');
                poly([[20,15],[38,30],[25,27]], '#475569');
                poly([[20,15],[2,30],[4,27]], '#64748B');
                poly([[20,15],[38,30],[36,27]], '#64748B');
                ctx.fillStyle = '#64748B';
                ctx.beginPath(); ctx.ellipse(16,13,3,4,0,0,Math.PI*2); ctx.fill(); // DSI进气道
                ctx.beginPath(); ctx.ellipse(24,13,3,4,0,0,Math.PI*2); ctx.fill();
                poly([[15,24],[9,38],[15,34]], '#1E293B');
                poly([[25,24],[31,38],[25,34]], '#1E293B');
                ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 0.5; ctx.strokeRect(17,20,6,10); // 内置弹舱线
                cockpitGlow(20, 7, 2, 4, '#FCD34D', '#F59E0B');
                exhaust(20, 41, 7);
                wingTipLight(2, 30, 38, 30);
            }
            else if (t === 5) { // F/A-18E 超级大黄蜂 - 重型，矩形进气口
                gradBody([[20,1],[27,11],[29,36],[24,40],[20,38],[16,40],[11,36],[13,11]], 0,0,40,40, '#B0BEC5','#546E7A');
                poly([[20,8],[5,22],[13,20]], '#78909C'); // 大LEX
                poly([[20,8],[35,22],[27,20]], '#78909C');
                poly([[14,18],[-1,32],[12,29]], '#546E7A');
                poly([[26,18],[41,32],[28,29]], '#546E7A');
                ctx.fillStyle = '#1C313A'; ctx.fillRect(13,14,5,7); ctx.fillRect(22,14,5,7); // 矩形进气口
                poly([[13,23],[6,38],[13,34]], '#37474F');
                poly([[27,23],[34,38],[27,34]], '#37474F');
                ctx.fillStyle = '#263238'; ctx.fillRect(-2,29,4,3); ctx.fillRect(38,29,4,3); // 翼尖导弹
                cockpitGlow(20, 8, 3, 5, '#93C5FD', '#3B82F6');
                exhaust(14, 41, 5); exhaust(26, 41, 5);
                wingTipLight(-1, 32, 41, 32);
            }
            else if (t === 6) { // B-2 幽灵 - BOSS，紫色脉冲
                ctx.shadowBlur = 20; ctx.shadowColor = '#7C3AED';
                ctx.fillStyle = '#0F172A';
                ctx.beginPath();
                ctx.moveTo(20, 4);
                ctx.bezierCurveTo(32,8, 42,16, 40,26);
                ctx.bezierCurveTo(38,32, 32,36, 30,38);
                ctx.lineTo(10, 38);
                ctx.bezierCurveTo(8,36, 2,32, 0,26);
                ctx.bezierCurveTo(-2,16, 8,8, 20,4);
                ctx.fill(); ctx.shadowBlur = 0;
                // 锯齿后缘
                ctx.fillStyle = '#1E1B4B';
                ctx.beginPath();
                [4,8,12,16,20,24,28,32,36].forEach((sx,i) => i===0 ? ctx.moveTo(sx,30) : ctx.lineTo(sx, i%2===0?30:37));
                ctx.lineTo(36,28); ctx.lineTo(4,28); ctx.closePath(); ctx.fill();
                // 面板线
                ctx.strokeStyle = '#312E81'; ctx.lineWidth = 0.6;
                [[20,4],[20,28]].reduce((a,b)=>{ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();return b;});
                ctx.beginPath(); ctx.moveTo(20,4); ctx.lineTo(4,26); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(20,4); ctx.lineTo(36,26); ctx.stroke();
                // 座舱
                cockpitGlow(20, 15, 5, 3, '#1F2937', '#4C1D95');
                // 四发紫色脉冲喷口
                [10,16,24,30].forEach(ex => exhaust(ex, 30, 4, 'rgba(200,180,255,', 'rgba(139,92,246,'));
                // 警告灯
                ctx.fillStyle = `rgba(239,68,68,${pulse})`;
                ctx.beginPath(); ctx.arc(3,24,1.5,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(37,24,1.5,0,Math.PI*2); ctx.fill();
            }

            ctx.restore();
        }

        function spawnEnemy() {
            const types = [
                {t: 0, w: 24, h: 24, hp: 1, s: 1.5, sc: 50, name: 'F-16'},
                {t: 1, w: 30, h: 30, hp: 2, s: 1.25, sc: 100, name: 'F-15'},
                {t: 2, w: 36, h: 36, hp: 5, s: 0.75, sc: 250, name: 'F/A-18'},
                {t: 3, w: 42, h: 42, hp: 15, s: 0.4, sc: 1000, name: 'F-22'},
                {t: 4, w: 39, h: 39, hp: 20, s: 0.35, sc: 1500, name: 'F-35'},
                {t: 5, w: 44, h: 44, hp: 25, s: 0.3, sc: 1750, name: 'F/A-18E'},
                {t: 6, w: 60, h: 38, hp: 100, s: 0.2, sc: 5000, name: 'B-2'}
            ];
            let weights = [40, 25, 15, 10, 5, 3, 2];
            if (score > 2000) weights = [30, 25, 20, 12, 6, 4, 3];
            if (score > 5000) weights = [20, 20, 18, 15, 10, 10, 7];
            if (score > 10000) weights = [15, 15, 15, 15, 15, 15, 10];
            const total = weights.reduce((a,b)=>a+b,0);
            let r = Math.random() * total, i = 0;
            for (; i < weights.length && (r -= weights[i]) > 0; i++);
            const e = types[i];
            enemies.push({x: Math.random() * (WIDTH - e.w) + e.w/2, y: -e.h, w: e.w, h: e.h, type: e.t, hp: e.hp, currentHp: e.hp, speed: e.s, score: e.sc, bullets: []});
        }

        function createExplosion(x, y, c, n) {
            for (let i = 0; i < n; i++) {
                particles.push({x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 30, color: c, size: Math.random()*4+2});
            }
        }

        function updateParticles() {
            particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; p.size *= 0.95; return p.life > 0; });
        }

        function drawParticles() {
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life/30; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 6.28); ctx.fill(); });
            ctx.globalAlpha = 1;
        }

        function playerShoot() {
            const spread = 15, startAngle = -spread * (bulletCount - 1) / 2;
            for (let i = 0; i < bulletCount; i++) {
                const a = (startAngle + i * spread) * Math.PI / 180;
                player.bullets.push({x: player.x, y: player.y - 20, vx: Math.sin(a) * 3, vy: -Math.cos(a) * 3, ricochet: ricochetCount, bounces: 0, isMissile: false});
            }
        }

        function playerShootMissile() {
            for (let i = 0; i < missileCount; i++) {
                const offset = (i - (missileCount - 1) / 2) * 20;
                player.bullets.push({
                    x: player.x + offset, 
                    y: player.y - 20, 
                    vx: 0, 
                    vy: -4, 
                    isMissile: true,
                    damage: 2
                });
            }
        }

        function checkUpgrade() {
            if (score >= getUpgradeThreshold()) {
                level++; gameState = 'upgrade';
                // 清空所有敌机子弹
                enemies.forEach(e => { if (e.bullets) e.bullets = []; });
                document.getElementById('skillPanel').style.display = 'block';
                document.getElementById('bulletCountVal').textContent = bulletCount;
                // 多重子弹满5时隐藏选项
                if (bulletCount >= 5) {
                    document.getElementById('multishotOption').style.display = 'none';
                } else {
                    document.getElementById('multishotOption').style.display = 'block';
                }
                document.getElementById('ricochetVal').textContent = ricochetCount;
                // 弹射满3时隐藏选项
                if (ricochetCount >= 3) {
                    document.getElementById('ricochetOption').style.display = 'none';
                } else {
                    document.getElementById('ricochetOption').style.display = 'block';
                }
                document.getElementById('missileVal').textContent = missileCount;
                // 跟踪弹满3时隐藏选项
                if (missileCount >= 3) {
                    document.getElementById('missileOption').style.display = 'none';
                } else {
                    document.getElementById('missileOption').style.display = 'block';
                }
                // 吸血满20时隐藏选项
                document.getElementById('leechVal').textContent = leechLevel + 1;
                document.getElementById('leechVal2').textContent = leechLevel;
                if (leechLevel >= 20) {
                    document.getElementById('leechOption').style.display = 'none';
                } else {
                    document.getElementById('leechOption').style.display = 'block';
                }
            }
            updateUI();
        }

        function selectSkill(s) {
            if (s === 'multishot' && bulletCount < 5) {
                bulletCount++;
            } else if (s === 'ricochet') {
                if (ricochetCount < 3) ricochetCount++;
            } else if (s === 'missile' && missileCount < 3) {
                missileCount++;
            } else if (s === 'leech' && leechLevel < 20) {
                leechLevel++;
            } else if (s === 'heal') {
                currentHp = Math.min(maxHp, currentHp + 3000);
            }
            // 关闭技能面板
            document.getElementById('skillPanel').style.display = 'none';
            gameState = 'playing';
            updateUI();
        }

        function update() {
            if (gameState !== 'playing') return;
            
            // 鼠标跟随
            player.x = mouseX;
            player.y = mouseY;
            player.x = Math.max(16, Math.min(WIDTH - 16, player.x));
            player.y = Math.max(20, Math.min(HEIGHT - 20, player.y));

            // 射击 - 普通子弹
            if (!player.lastShot || Date.now() - player.lastShot > 200) {
                playerShoot();
                player.lastShot = Date.now();
            }
            // 射击 - 跟踪弹（间隔更慢，400ms）
            if (missileCount > 0 && (!player.lastMissileShot || Date.now() - player.lastMissileShot > 400)) {
                playerShootMissile();
                player.lastMissileShot = Date.now();
            }

            // 更新子弹
            player.bullets = player.bullets.filter(b => {
                if (b.isMissile && enemies.length > 0) {
                    // 导弹追踪最近的敌人
                    let nearest = enemies[0];
                    let minDist = Math.sqrt((b.x - nearest.x) ** 2 + (b.y - nearest.y) ** 2);
                    for (const e of enemies) {
                        const d = Math.sqrt((b.x - e.x) ** 2 + (b.y - e.y) ** 2);
                        if (d < minDist) { minDist = d; nearest = e; }
                    }
                    const dx = nearest.x - b.x;
                    const dy = nearest.y - b.y;
                    const angle = Math.atan2(dy, dx);
                    // 慢慢转向目标
                    b.vx = Math.cos(angle) * 4;
                    b.vy = Math.sin(angle) * 4;
                }
                b.x += b.vx; b.y += b.vy;
                if (b.ricochet > 0 && b.bounces < b.ricochet) {
                    if (b.x <= 0 || b.x >= WIDTH) { b.vx *= -0.8; b.x = b.x <= 0 ? 1 : WIDTH - 1; b.bounces++; }
                    if (b.y <= 0) { b.vy *= -0.8; b.y = 1; b.bounces++; }
                }
                return b.y > -50 && b.y < HEIGHT + 50;
            });

            // 更新敌机
            enemies.forEach(e => {
                e.y += e.speed;
                if (Math.random() < 0.01 && e.y > 50) {
                    if (!e.bullets) e.bullets = [];
                    // 追踪玩家
                    const dx = player.x - e.x;
                    const dy = player.y - (e.y + e.h/2);
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    e.bullets.push({x: e.x, y: e.y + e.h/2, vx: (dx/dist) * 2.5, vy: (dy/dist) * 2.5});
                }
                if (e.bullets) e.bullets = e.bullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.y < HEIGHT && b.x > 0 && b.x < WIDTH; });
            });
            enemies = enemies.filter(e => e.y < HEIGHT + e.h);

            // 碰撞检测
            player.bullets = player.bullets.filter(b => {
                let hit = false;
                enemies = enemies.filter(e => {
                    if (Math.abs(b.x - e.x) < e.w/2 && Math.abs(b.y - e.y) < e.h/2) {
                        e.currentHp--; hit = true;
                        if (e.currentHp <= 0) {
                            score += e.score;
                            // 吸血效果
                            if (leechLevel > 0) {
                                currentHp = Math.min(maxHp, currentHp + leechLevel);
                                updateUI();
                            }
                            createExplosion(e.x, e.y, '#FF6B6B', 20);
                            checkUpgrade();
                            return false;
                        }
                    }
                    return true;
                });
                return !hit;
            });

            // 敌机子弹打玩家
            enemies.forEach(e => {
                if (e.bullets) {
                    e.bullets = e.bullets.filter(b => {
                        if (Math.abs(b.x - player.x) < 16 && Math.abs(b.y - player.y) < 20) {
                            currentHp -= 100;
                            createExplosion(player.x, player.y, '#FFD700', 5);
                            updateUI();
                            if (currentHp <= 0) gameOver();
                            return false;
                        }
                        return true;
                    });
                }
            });

            // 敌机撞玩家
            enemies.forEach(e => {
                if (Math.abs(e.x - player.x) < (e.w + 32)/2 && Math.abs(e.y - player.y) < (e.h + 40)/2) {
                    currentHp -= 500;
                    e.currentHp = 0;
                    createExplosion(e.x, e.y, '#FF4444', 15);
                    updateUI();
                    if (currentHp <= 0) gameOver();
                }
            });
            enemies = enemies.filter(e => e.currentHp > 0);

            updateParticles();
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // 星空背景
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 127 + Date.now() / 50) % WIDTH;
                const y = (i * 97 + Date.now() / 100) % HEIGHT;
                ctx.fillRect(x, y, 1, 1);
            }

            if (gameState !== 'playing' && gameState !== 'upgrade') return;

            // 绘制玩家飞机
            drawPlane(ctx, player.x - 16, player.y - 20, 32, 40, selectedPlane);

            // 绘制子弹
            player.bullets.forEach(b => {
                if (b.isMissile) {
                    // 导弹 - 更大的红色子弹
                    ctx.fillStyle = '#FF4500';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    // 导弹尾焰
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y + 5, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // 普通子弹
                    ctx.fillStyle = '#0ff';
                    ctx.fillRect(b.x - 1.5, b.y - 6, 3, 12);
                }
            });

            // 绘制敌机
            enemies.forEach(e => {
                drawEnemy(ctx, e.x - e.w/2, e.y - e.h/2, e.w, e.h, e.type);
                if (e.bullets) {
                    ctx.fillStyle = '#f44';
                    e.bullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 4, 4, 8));
                }
                // 血条
                if (e.currentHp < e.hp) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 10, e.w, 4);
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 10, e.w * (e.currentHp/e.hp), 4);
                }
            });

            drawParticles();
        }

        function updateUI() {
            document.getElementById('healthFill').style.width = Math.max(0, currentHp/maxHp*100) + '%';
            document.getElementById('healthText').textContent = `HP: ${Math.max(0, currentHp)} / ${maxHp}`;
            document.getElementById('score').textContent = `积分: ${score}`;
            document.getElementById('level').textContent = `等级: ${level}`;
            document.getElementById('nextUpgrade').textContent = `升级还需: ${Math.max(0, getUpgradeThreshold() - score)}分`;
            document.getElementById('missileLevel').textContent = missileCount;
            document.getElementById('leechLevel').textContent = leechLevel;
            document.getElementById('bulletLevel').textContent = bulletCount;
            // 显示最高分
            const bestPlayer = localStorage.getItem('thunderWarriorBestPlayer') || '-';
            document.getElementById('bestPlayerName').textContent = `🏆 最高: ${bestPlayer}`;
            document.getElementById('bestScoreVal').textContent = bestScore;
        }

        function gameOver() {
            gameState = 'gameover';
            // 保存上一局分数和最高分
            lastScore = score;
            localStorage.setItem('thunderWarriorLastScore', lastScore.toString());
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('thunderWarriorBestScore', bestScore.toString());
                localStorage.setItem('thunderWarriorBestPlayer', playerName || '匿名');
            }
            savePlayerRecord(playerName || '匿名', score);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOver').innerHTML = `
                <h2>游戏结束</h2>
                <p>本次积分: ${score}</p>
                <p>最高分: ${bestScore}</p>
                <p>上局: ${lastScore}</p>
                <p>最高等级: ${level}</p>
                <button id="restartBtn">重新开始</button>
            `;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('restartBtn').addEventListener('click', restart);
        }

        function restart() {
            score = 0; level = 1; maxHp = 10000; currentHp = 10000;
            bulletCount = 1; ricochetCount = 0; missileCount = 0; leechLevel = 0;
            enemies = []; particles = []; player.bullets = [];
            player.x = WIDTH/2; player.y = HEIGHT - 100;
            gameState = 'select';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('selectPanel').style.display = 'block';
            updateUI();
            fetchPlayerList();
        }

        function selectPlane(i) {
            selectedPlane = i;
            document.getElementById('selectPanel').style.display = 'none';
            gameState = 'playing';
        }

        function drawPreviews() {
            for (let i = 0; i < 4; i++) {
                const c = document.getElementById('preview' + i).getContext('2d');
                c.clearRect(0, 0, 64, 80);
                drawPlane(c, 16, 20, 32, 40, i);
            }
        }

        // 触摸控制 - 手机大拇指拖动
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - r.left;
            mouseY = touch.clientY - r.top;
        }, {passive: false});
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - r.left;
            mouseY = touch.clientY - r.top;
        }, {passive: false});
        
        // 鼠标控制（电脑）
        canvas.addEventListener('mousemove', e => {
            const r = canvas.getBoundingClientRect();
            mouseX = e.clientX - r.left;
            mouseY = e.clientY - r.top;
        });

        // 登录面板逻辑 - 放在游戏启动前
        const selectPanel = document.getElementById('selectPanel');
        const loginPanel = document.getElementById('loginPanel');
        const loginBtn = document.getElementById('loginBtn');
        const playerNameInput = document.getElementById('playerName');
        const bestScoreDisplay = document.getElementById('bestScoreDisplay');
        
        // 默认隐藏选机面板，显示登录面板
        if (selectPanel) selectPanel.style.display = 'none';
        
        // 服务器地址（同一台机器上运行服务器时自动匹配，部署后改为实际地址）
        const API_BASE = 'http://43.128.118.144:3001';

        // 玩家记录管理
        function renderPlayerList(records) {
            const el = document.getElementById('playerList');
            if (!el) return;
            if (!records || records.length === 0) { el.innerHTML = ''; return; }
            const medals = ['🥇','🥈','🥉'];
            el.innerHTML = '<h3>参与玩家 (' + records.length + '人)</h3>' +
                records.slice(0, 10).map((r, i) =>
                    `<div class="player-record">
                        <span class="pr-rank">${medals[i] || (i+1)}</span>
                        <span class="pr-name">${r.name}</span>
                        <span class="pr-score">${r.bestScore}</span>
                        <span class="pr-count">${r.playCount}局</span>
                    </div>`
                ).join('');
        }

        function fetchPlayerList() {
            fetch(API_BASE + '/api/players')
                .then(r => r.json())
                .then(records => renderPlayerList(records))
                .catch(() => {
                    // 服务器不可用时降级到 localStorage
                    try {
                        const records = JSON.parse(localStorage.getItem('thunderWarriorPlayers') || '[]');
                        renderPlayerList(records);
                    } catch(e) {}
                });
        }

        function savePlayerRecord(name, score) {
            fetch(API_BASE + '/api/players', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, score })
            })
            .then(r => r.json())
            .then(records => renderPlayerList(records))
            .catch(() => {
                // 降级到 localStorage
                try {
                    const records = JSON.parse(localStorage.getItem('thunderWarriorPlayers') || '[]');
                    const existing = records.find(r => r.name === name);
                    if (existing) {
                        if (score > existing.bestScore) existing.bestScore = score;
                        existing.playCount = (existing.playCount || 1) + 1;
                    } else {
                        records.push({ name, bestScore: score, playCount: 1 });
                    }
                    records.sort((a, b) => b.bestScore - a.bestScore);
                    localStorage.setItem('thunderWarriorPlayers', JSON.stringify(records));
                    renderPlayerList(records);
                } catch(e) {}
            });
        }

        // 显示最高分
        function updateBestScoreDisplay() {
            if (bestScore > 0 && bestScoreDisplay) {
                const savedName = localStorage.getItem('thunderWarriorPlayerName') || '匿名';
                bestScoreDisplay.textContent = `🏆 最高分: ${bestScore} (${savedName})`;
            }
        }
        updateBestScoreDisplay();
        fetchPlayerList();
        
        // 如果已有名字，自动填充
        if (playerName && playerNameInput) {
            playerNameInput.value = playerName;
        }
        
        // 点击开始游戏
        if (loginBtn) {
            loginBtn.addEventListener('click', () => {
                const name = playerNameInput.value.trim() || '匿名';
                playerName = name;
                localStorage.setItem('thunderWarriorPlayerName', name);
                if (loginPanel) loginPanel.style.display = 'none';
                if (selectPanel) selectPanel.style.display = 'block';
                gameState = 'select';
                updateUI();
            });
        }
        
        // 回车也能提交
        if (playerNameInput) {
            playerNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && loginBtn) loginBtn.click();
            });
        }

        document.querySelectorAll('.plane-btn').forEach(b => {
            b.addEventListener('click', () => selectPlane(parseInt(b.dataset.plane)));
        });
        document.getElementById('restartBtn').addEventListener('click', restart);
        
        // 游戏循环
        let lastSpawn = 0;
        function gameLoop(t) {
            if (gameState === 'playing' && t - lastSpawn > 800) {
                spawnEnemy();
                lastSpawn = t;
            }
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        drawPreviews();
        updateUI();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
