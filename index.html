<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷电战机 - Thunder Warrior</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; }
        #gameContainer { position: relative; }
        #gameCanvas { border: 2px solid #0ff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; color: #fff; font-size: 14px; pointer-events: none; }
        #healthBar { width: 200px; height: 20px; background: #333; border: 2px solid #0ff; border-radius: 3px; overflow: hidden; }
        #healthFill { height: 100%; background: linear-gradient(90deg, #f00, #ff0); transition: width 0.2s; }
        #stats { margin-top: 5px; display: flex; justify-content: space-between; }
        #nextUpgrade { color: #ff0; font-size: 12px; margin-top: 3px; }
        #skillPanel, #upgradePanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #0f0; border-radius: 15px; padding: 25px; color: #fff; display: none; z-index: 100; text-align: center; min-width: 300px; }
        #skillPanel h2, #upgradePanel h2 { color: #0f0; margin-bottom: 20px; font-size: 22px; }
        .skill-option { background: linear-gradient(180deg, #1a1a1a, #333); border: 2px solid #0f0; color: #fff; padding: 15px 20px; margin: 10px 0; cursor: pointer; border-radius: 8px; font-size: 16px; transition: all 0.2s; width: 100%; }
        .skill-option:hover { background: linear-gradient(180deg, #2a2a2a, #444); box-shadow: 0 0 15px #0f0; transform: scale(1.02); }
        .skill-option .skill-name { color: #0f0; font-size: 18px; font-weight: bold; }
        .skill-option .skill-desc { color: #aaa; font-size: 12px; margin-top: 5px; }
        #selectPanel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #f00; border-radius: 10px; padding: 30px; color: #fff; z-index: 100; }
        #selectPanel h2 { color: #f00; text-align: center; margin-bottom: 20px; }
        .plane-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .plane-btn { background: linear-gradient(180deg, #1a1a1a, #333); border: 2px solid #f00; color: #fff; padding: 15px; cursor: pointer; border-radius: 8px; text-align: center; transition: all 0.2s; }
        .plane-btn:hover { border-color: #ff0; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .plane-btn canvas { display: block; margin: 0 auto 10px; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); border: 2px solid #f00; border-radius: 10px; padding: 30px; color: #fff; text-align: center; display: none; z-index: 100; }
        #gameOver h2 { color: #f00; font-size: 28px; margin-bottom: 15px; }
        #restartBtn { background: linear-gradient(180deg, #600, #900); border: 2px solid #f00; color: #fff; padding: 10px 30px; cursor: pointer; border-radius: 5px; font-size: 16px; margin-top: 15px; }
        #restartBtn:hover { box-shadow: 0 0 15px #f00; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="ui">
            <div id="healthBar"><div id="healthFill"></div></div>
            <div id="stats">
                <span id="healthText">HP: 10000 / 10000</span>
                <span id="score">积分: 0</span>
                <span id="level">等级: 1</span>
            </div>
            <div id="nextUpgrade">升级还需: 1000分</div>
        </div>
        <div id="selectPanel">
            <h2>选择你的战机</h2>
            <div class="plane-select">
                <div class="plane-btn" data-plane="0"><canvas id="preview0" width="64" height="80"></canvas><div>歼-10 猛龙</div></div>
                <div class="plane-btn" data-plane="1"><canvas id="preview1" width="64" height="80"></canvas><div>歼-16 潜龙</div></div>
                <div class="plane-btn" data-plane="2"><canvas id="preview2" width="64" height="80"></canvas><div>歼-20 威龙</div></div>
                <div class="plane-btn" data-plane="3"><canvas id="preview3" width="64" height="80"></canvas><div>歼-35 鹘鹰</div></div>
            </div>
        </div>
        <div id="skillPanel">
            <h2>🎉 升级成功！选择技能</h2>
            <div class="skill-option" onclick="selectSkill('multishot')">
                <div class="skill-name">🔫 多重导弹</div>
                <div class="skill-desc">子弹数 +1 (当前: <span id="bulletCountVal">1</span>)</div>
            </div>
            <div class="skill-option" onclick="selectSkill('ricochet')">
                <div class="skill-name">↩️ 弹射导弹</div>
                <div class="skill-desc">子弹弹射 +1 (当前: <span id="ricochetVal">0</span>)</div>
            </div>
            <div class="skill-option" onclick="selectSkill('heal')">
                <div class="skill-name">❤️ 修复机体</div>
                <div class="skill-desc">恢复 3000 生命值</div>
            </div>
        </div>
        <div id="gameOver">
            <h2>游戏结束</h2>
            <p>最终积分: <span id="finalScore">0</span></p>
            <p>最高等级: <span id="finalLevel">1</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = canvas.width, HEIGHT = canvas.height;

        let gameState = 'select';
        let score = 0, level = 1, maxHp = 10000, currentHp = 10000, selectedPlane = 0;
        let bulletCount = 1, ricochetCount = 0;

        const player = { x: WIDTH/2, y: HEIGHT-100, width: 32, height: 40, bullets: [] };
        let isDragging = false, dragOffset = {x:0, y:0};
        let enemies = [], particles = [];
        let mouseX = WIDTH/2, mouseY = HEIGHT-100;
        const UPGRADE_THRESHOLD = 1000;

        // 绘制中国战机
        function drawChinesePlane(ctx, x, y, w, h, type) {
            ctx.save(); ctx.translate(x, y); const scale = w/32; ctx.scale(scale, scale);
            const bw=32, bh=40;
            if(type==0){
                ctx.fillStyle='#8B0000';ctx.beginPath();ctx.moveTo(bw/2,0);ctx.lineTo(bw/2+6,bh-5);ctx.lineTo(bw/2-6,bh-5);ctx.fill();
                ctx.fillStyle='#B22222';ctx.beginPath();ctx.moveTo(bw/2-3,bh*0.4);ctx.lineTo(0,bh*0.7);ctx.lineTo(bw/2-3,bh*0.6);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+3,bh*0.4);ctx.lineTo(bw,bh*0.7);ctx.lineTo(bw/2+3,bh*0.6);ctx.fill();
                ctx.fillStyle='#CD5C5C';ctx.beginPath();ctx.moveTo(bw/2-2,bh-8);ctx.lineTo(bw/2-6,bh);ctx.lineTo(bw/2,bh-5);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+2,bh-8);ctx.lineTo(bw/2+6,bh);ctx.lineTo(bw/2,bh-5);ctx.fill();
                ctx.fillStyle='#00CED1';ctx.beginPath();ctx.ellipse(bw/2,bh*0.3,3,5,0,0,6.28);ctx.fill();
            }else if(type==1){
                ctx.fillStyle='#800000';ctx.beginPath();ctx.moveTo(bw/2,0);ctx.lineTo(bw/2+5,bh);ctx.lineTo(bw/2-5,bh);ctx.fill();
                ctx.fillStyle='#A52A2A';ctx.beginPath();ctx.moveTo(bw/2-4,bh*0.35);ctx.lineTo(0,bh*0.6);ctx.lineTo(bw/2-4,bh*0.55);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+4,bh*0.35);ctx.lineTo(bw,bh*0.6);ctx.lineTo(bw/2+4,bh*0.55);ctx.fill();
                ctx.fillStyle='#4A0000';ctx.fillRect(bw/2-4,bh-6,3,6);ctx.fillRect(bw/2+1,bh-6,3,6);
                ctx.fillStyle='#B22222';ctx.beginPath();ctx.moveTo(bw/2-5,bh-5);ctx.lineTo(bw/2-8,bh);ctx.lineTo(bw/2-3,bh);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+5,bh-5);ctx.lineTo(bw/2+8,bh);ctx.lineTo(bw/2+3,bh);ctx.fill();
                ctx.fillStyle='#20B2AA';ctx.beginPath();ctx.ellipse(bw/2,bh*0.25,3,6,0,0,6.28);ctx.fill();
            }else if(type==2){
                ctx.fillStyle='#2F0000';ctx.beginPath();ctx.moveTo(bw/2,0);ctx.lineTo(bw/2+4,bh);ctx.lineTo(bw/2-4,bh);ctx.fill();
                ctx.fillStyle='#4A0000';ctx.beginPath();ctx.moveTo(bw/2-3,bh*0.3);ctx.lineTo(2,bh*0.5);ctx.lineTo(bw/2-3,bh*0.5);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+3,bh*0.3);ctx.lineTo(bw-2,bh*0.5);ctx.lineTo(bw/2+3,bh*0.5);ctx.fill();
                ctx.fillStyle='#600000';ctx.beginPath();ctx.moveTo(bw/2-2,bh*0.15);ctx.lineTo(bw/2-7,bh*0.2);ctx.lineTo(bw/2-2,bh*0.22);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+2,bh*0.15);ctx.lineTo(bw/2+7,bh*0.2);ctx.lineTo(bw/2+2,bh*0.22);ctx.fill();
                ctx.fillStyle='#FF4500';ctx.fillRect(bw/2-3,bh-4,2,4);ctx.fillRect(bw/2+1,bh-4,2,4);
                ctx.fillStyle='#FFD700';ctx.beginPath();ctx.ellipse(bw/2,bh*0.2,2,5,0,0,6.28);ctx.fill();
            }else{
                ctx.fillStyle='#1A0000';ctx.beginPath();ctx.moveTo(bw/2,0);ctx.lineTo(bw/2+4,bh);ctx.lineTo(bw/2-4,bh);ctx.fill();
                ctx.fillStyle='#330000';ctx.beginPath();ctx.moveTo(bw/2-3,bh*0.35);ctx.lineTo(0,bh*0.55);ctx.lineTo(bw/2-3,bh*0.5);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+3,bh*0.35);ctx.lineTo(bw,bh*0.55);ctx.lineTo(bw/2+3,bh*0.5);ctx.fill();
                ctx.fillStyle='#440000';ctx.beginPath();ctx.moveTo(bw/2-4,bh-6);ctx.lineTo(bw/2-7,bh);ctx.lineTo(bw/2-2,bh);ctx.fill();
                ctx.beginPath();ctx.moveTo(bw/2+4,bh-6);ctx.lineTo(bw/2+7,bh);ctx.lineTo(bw/2+2,bh);ctx.fill();
                ctx.fillStyle='#FF6347';ctx.fillRect(bw/2-3,bh-4,2,4);ctx.fillRect(bw/2+1,bh-4,2,4);
                ctx.fillStyle='#4169E1';ctx.beginPath();ctx.ellipse(bw/2,bh*0.22,2,4,0,0,6.28);ctx.fill();
            }
            ctx.restore();
        }

        // 绘制敌机
        function drawEnemyPlane(ctx, x, y, w, h, t) {
            ctx.save(); ctx.translate(x, y); const scale = w/32; ctx.scale(scale, scale);
            const bw=32, bh=32;
            const colors=[['#4A5568','#2D3748','#1A202C'],['#374151','#1F2937','#111827'],['#4B5563','#374151','#1F2937'],['#6B7280','#4B5563','#374151']];
            ctx.fillStyle=colors[t][0];ctx.beginPath();ctx.moveTo(bw/2,bh);ctx.lineTo(bw/2+(t==3?7:t==2?6:t==1?5:4),0);ctx.lineTo(bw/2-(t==3?7:t==2?6:t==1?5:4),0);ctx.fill();
            ctx.fillStyle=colors[t][1];ctx.beginPath();ctx.moveTo(bw/2-(t==3?6:t==2?5:t==1?4:3),bh*(t==3?0.45:t==2?0.4:t==1?0.35:0.4));ctx.lineTo(0,bh*(t==3?0.25:t==2?0.2:t==1?0.15:0.2));ctx.lineTo(bw/2-(t==3?6:t==2?5:t==1?4:3),bh*(t==3?0.35:t==2?0.3:t==1?0.25:0.3));ctx.fill();
            ctx.beginPath();ctx.moveTo(bw/2+(t==3?6:t==2?5:t==1?4:3),bh*(t==3?0.45:t==2?0.4:t==1?0.35:0.4));ctx.lineTo(bw,bh*(t==3?0.25:t==2?0.2:t==1?0.15:0.2));ctx.lineTo(bw/2+(t==3?6:t==2?5:t==1?4:3),bh*(t==3?0.35:t==2?0.3:t==1?0.25:0.3));ctx.fill();
            if(t>=2){ctx.fillStyle=colors[t][2];ctx.beginPath();ctx.moveTo(bw/2-6,bh*0.7);ctx.lineTo(bw/2-10,bh);ctx.lineTo(bw/2-3,bh*0.8);ctx.fill();ctx.beginPath();ctx.moveTo(bw/2+6,bh*0.7);ctx.lineTo(bw/2+10,bh);ctx.lineTo(bw/2+3,bh*0.8);ctx.fill();}
            ctx.fillStyle=colors[t][2];ctx.beginPath();ctx.ellipse(bw/2,bh*0.6,2,3,0,0,6.28);ctx.fill();
            ctx.restore();
        }

        function spawnEnemy(){
            const types=[{t:0,w:28,h:28,hp:1,s:3,sc:100},{t:1,w:36,h:36,hp:2,s:2.5,sc:200},{t:2,w:48,h:48,hp:5,s:1.5,sc:500},{t:3,w:60,h:60,hp:15,s:0.8,sc:2000}];
            let w=[60,30,8,2];if(score>2000)w=[40,35,20,5];if(score>5000)w=[30,35,25,10];if(score>10000)w=[20,30,35,15];
            let r=Math.random()*w.reduce((a,b)=>a+b,0),i=0;for(;i<w.length&&(r-=w[i])>0;i++);
            let e=types[i];enemies.push({x:Math.random()*(WIDTH-e.w)+e.w/2,y:-e.h,w:e.w,h:e.h,type:e.t,hp:e.hp,currentHp:e.hp,speed:e.s,score:e.sc,lastShot:0});
        }

        function createExplosion(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:30,color:c,size:Math.random()*4+2});}
        function updateParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.size*=.95;return p.life>0;});}
        function drawParticles(){particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,6.28);ctx.fill();});ctx.globalAlpha=1;}

        function playerShoot(){
            const spread=15,startAngle=-spread*(bulletCount-1)/2;
            for(let i=0;i<bulletCount;i++){const a=(startAngle+i*spread)*Math.PI/180;player.bullets.push({x:player.x,y:player.y-player.height/2,vx:Math.sin(a)*10,vy:-Math.cos(a)*10,d:1,ricochet:ricochetCount,bounces:0});}
        }

        function enemyShoot(e){const n=Date.now();if(n-e.lastShot>1500&&e.y>50){e.lastShot=n;if(!e.b)e.b=[];e.b.push({x:e.x,y:e.y+e.h/2,speed:4});}}

        function checkUpgrade(){const t=level*UPGRADE_THRESHOLD;if(score>=t){level++;gameState='upgrade';showSkillPanel();}updateUI();}
        function showSkillPanel(){document.getElementById('skillPanel').style.display='block';document.getElementById('bulletCountVal').textContent=bulletCount;document.getElementById('ricochetVal').textContent=ricochetCount;}
        function selectSkill(s){if(s==='multishot')bulletCount++;else if(s==='ricochet')ricochetCount++;else if(s==='heal')currentHp=Math.min(maxHp,currentHp+3000);document.getElementById('skillPanel').style.display='none';gameState='playing';updateUI();}

        function update(){
            if(gameState!=='playing')return;
            // 拖动模式
            if(isDragging){
                player.x=mouseX-dragOffset.x;
                player.y=mouseY-dragOffset.y;
                console.log('update drag', player.x, player.y);
            }
            player.x=Math.max(player.width/2,Math.min(WIDTH-player.width/2,player.x));player.y=Math.max(player.height/2+50,Math.min(HEIGHT-player.height/2,player.y));
            if(!player.lastShot||Date.now()-player.lastShot>200){playerShoot();player.lastShot=Date.now();}
            player.bullets=player.bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;if(b.ricochet>0&&b.bounces<b.ricochet){if(b.x<=0||b.x>=WIDTH){b.vx*=-.8;b.x=b.x<=0?1:WIDTH-1;b.bounces++;}if(b.y<=0){b.vy*=-.8;b.y=1;b.bounces++;}}return b.y>-50&&b.y<HEIGHT+50;});
            enemies.forEach(e=>{e.y+=e.speed;if(e.type>=1)enemyShoot(e);if(e.b)e.b=e.b.filter(b=>{b.y+=b.speed;return b.y<HEIGHT;});});
            enemies=enemies.filter(e=>e.y<HEIGHT+e.h);
            player.bullets=player.bullets.filter(b=>{let h=false;enemies=enemies.filter(e=>{const dx=b.x-e.x,dy=b.y-e.y;if(Math.abs(dx)<e.w/2&&Math.abs(dy)<e.h/2){e.currentHp--;h=true;if(e.currentHp<=0){score+=e.score;createExplosion(e.x,e.y,'#FF6B6B',20);checkUpgrade();return false;}}return true;});return!h;});
            enemies.forEach(e=>{if(e.b)e.b=e.b.filter(b=>{const dx=b.x-player.x,dy=b.y-player.y;if(Math.abs(dx)<player.width/2&&Math.abs(dy)<player.height/2){currentHp-=100;createExplosion(player.x,player.y,'#FFD700',5);updateUI();if(currentHp<=0)gameOver();return false;}return true;});});
            enemies.forEach(e=>{const dx=e.x-player.x,dy=e.y-player.y;if(Math.abs(dx)<(e.w+player.width)/2&&Math.abs(dy)<(e.h+player.height)/2){currentHp-=500;e.currentHp=0;createExplosion(e.x,e.y,'#FF4444',15);updateUI();if(currentHp<=0)gameOver();}});
            enemies=enemies.filter(e=>e.currentHp>0);updateParticles();
        }

        function draw(){
            ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,WIDTH,HEIGHT);
            ctx.fillStyle='#fff';for(let i=0;i<50;i++){const x=(i*127+Date.now()/50)%WIDTH,y=(i*97+Date.now()/100)%HEIGHT;ctx.fillRect(x,y,1,1);}
            if(gameState!=='playing'&&gameState!=='upgrade')return;
            // 调试：绘制玩家位置
            console.log('draw player', player.x, player.y, isDragging);
            drawChinesePlane(ctx,player.x-player.width/2,player.y-player.height/2,player.width,player.height,selectedPlane);
            ctx.fillStyle='#0ff';player.bullets.forEach(b=>{ctx.fillRect(b.x-2,b.y-8,4,16);});
            enemies.forEach(e=>{drawEnemyPlane(ctx,e.x-e.w/2,e.y-e.h/2,e.w,e.h,e.type);if(e.b){ctx.fillStyle='#f44';e.b.forEach(b=>{ctx.fillRect(b.x-2,b.y-4,4,8);});}if(e.currentHp<e.hp){const bw=e.w,bh=3,bx=e.x-bw/2,by=e.y-e.h/2-8;ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);ctx.fillStyle='#f00';ctx.fillRect(bx,by,bw*(e.currentHp/e.hp),bh);}});
            drawParticles();
        }

        function updateUI(){const hp=Math.max(0,currentHp/maxHp*100);document.getElementById('healthFill').style.width=hp+'%';document.getElementById('healthText').textContent=`HP: ${Math.max(0,currentHp)} / ${maxHp}`;document.getElementById('score').textContent=`积分: ${score}`;document.getElementById('level').textContent=`等级: ${level}`;const next=level*UPGRADE_THRESHOLD-score;document.getElementById('nextUpgrade').textContent=`升级还需: ${Math.max(0,next)}分`;}
        function gameOver(){gameState='gameover';document.getElementById('finalScore').textContent=score;document.getElementById('finalLevel').textContent=level;document.getElementById('gameOver').style.display='block';}
        function restart(){score=0;level=1;maxHp=10000;currentHp=10000;bulletCount=1;ricochetCount=0;enemies=[];particles=[];player.bullets=[];player.x=WIDTH/2;player.y=HEIGHT-100;isDragging=false;gameState='select';document.getElementById('gameOver').style.display='none';document.getElementById('selectPanel').style.display='block';updateUI();}
        function selectPlane(i){selectedPlane=i;document.getElementById('selectPanel').style.display='none';gameState='playing';console.log('selectPlane', gameState, player.x, player.y);}
        function drawPreviews(){for(let i=0;i<4;i++){const c=document.getElementById('preview'+i).getContext('2d');c.clearRect(0,0,64,80);drawChinesePlane(c,16,20,32,40,i);}}

        canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;const dx=mouseX-player.x,dy=mouseY-player.y;if(Math.abs(dx)<player.width*1.5&&Math.abs(dy)<player.height*1.5){isDragging=true;dragOffset={x:dx,y:dy};console.log('drag start', dragOffset);}});
        canvas.addEventListener('mouseup',()=>isDragging=false);
        canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;if(isDragging)console.log('dragging', mouseX, mouseY);});
        canvas.addEventListener('mouseleave',()=>isDragging=false);
        document.querySelectorAll('.plane-btn').forEach(b=>b.addEventListener('click',()=>selectPlane(parseInt(b.dataset.plane))));
        document.getElementById('restartBtn').addEventListener('click',restart);

        let lastSpawn=0;
        function gameLoop(t){if(gameState==='playing'&&t-lastSpawn>800){spawnEnemy();lastSpawn=t;}update();draw();requestAnimationFrame(gameLoop);}
        drawPreviews();updateUI();requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
